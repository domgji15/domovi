services:
  postgres:
    image: postgres:16-alpine
    container_name: domovi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-domovi}
      POSTGRES_USER: ${POSTGRES_USER:-domovi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-domovi}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-domovi} -d ${POSTGRES_DB:-domovi}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
