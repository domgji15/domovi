<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Prijava | Domovi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f3f4f7;
            --card: #ffffff;
            --muted: #6b7280;
            --text: #111827;
            --border: #e5e7eb;
            --field: #ffffff;
            --btn: #2563eb;
            --btn-hover: #1d4ed8;
        }

        body.dark-mode {
            --bg: #0b1020;
            --card: #111827;
            --muted: #9ca3af;
            --text: #e5e7eb;
            --border: #374151;
            --field: #0f172a;
            --btn: #3b82f6;
            --btn-hover: #2563eb;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 10% 0%, rgba(37, 99, 235, 0.1), transparent 45%), var(--bg);
            color: var(--text);
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .login-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .login-card {
            width: 100%;
            max-width: 430px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.15);
            padding: 30px;
            position: relative;
        }

        .brand {
            font-size: 30px;
            font-weight: 800;
            margin-bottom: 2px;
        }

        .subtitle {
            color: var(--muted);
            margin-bottom: 20px;
        }

        .theme-toggle {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 38px;
            height: 38px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--field);
            color: var(--text);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            font-size: 16px;
            line-height: 1;
        }

        .login-label {
            font-weight: 600;
            margin-bottom: 6px;
        }

        .login-input {
            height: 46px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--field);
            color: var(--text);
        }

        .login-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background: var(--field);
            color: var(--text);
        }

        .login-input::placeholder {
            color: var(--muted);
        }

        .login-btn {
            height: 46px;
            border-radius: 12px;
            border: none;
            background: var(--btn);
            color: #fff;
            font-weight: 700;
        }

        .login-btn:hover {
            background: var(--btn-hover);
        }

        .password-wrap {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            border: 1px solid var(--border);
            background: var(--field);
            color: var(--muted);
            border-radius: 8px;
            height: 30px;
            min-width: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            line-height: 1;
            padding: 0 8px;
        }

        .password-toggle:hover {
            color: var(--text);
        }

        .login-input-password {
            padding-right: 52px;
        }

        .error-box {
            border: 1px solid #ef4444;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.08);
            border-radius: 12px;
            padding: 10px 12px;
            margin-bottom: 16px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-shell">
        <div class="login-card">
            <button type="button" class="theme-toggle" id="themeToggleBtn" aria-label="Promijeni temu">
                <span id="themeIcon">🌙</span>
            </button>

            <div class="brand">Domovi</div>
            <div class="subtitle">Prijava u sustav</div>

            {% if form.errors %}
                <div class="error-box">
                    Neispravno korisničko ime ili lozinka.
                </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                {% if next %}
                    <input type="hidden" name="next" value="{{ next }}">
                {% endif %}

                <div class="mb-3">
                    <label class="login-label">Korisničko ime</label>
                    <input type="text"
                           name="username"
                           class="form-control login-input"
                           placeholder="Unesi korisničko ime"
                           value="{{ form.username.value|default:'' }}"
                           autocomplete="username"
                           required>
                </div>

                <div class="mb-4">
                    <label class="login-label">Lozinka</label>
                    <div class="password-wrap">
                        <input type="password"
                               name="password"
                               id="passwordInput"
                               class="form-control login-input login-input-password"
                               placeholder="Unesi lozinku"
                               autocomplete="current-password"
                               required>
                        <button type="button" class="password-toggle" id="passwordToggleBtn" aria-label="Prikaži lozinku">
                            👁
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn login-btn w-100">Prijavi se</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const body = document.body;
            const toggleBtn = document.getElementById("themeToggleBtn");
            const icon = document.getElementById("themeIcon");
            const passwordInput = document.getElementById("passwordInput");
            const passwordToggleBtn = document.getElementById("passwordToggleBtn");
            const storageKey = "theme_mode";

            const applyTheme = (mode) => {
                const isDark = mode === "dark";
                body.classList.toggle("dark-mode", isDark);
                icon.textContent = isDark ? "☀️" : "🌙";
            };

            const savedMode = localStorage.getItem(storageKey);
            applyTheme(savedMode === "dark" ? "dark" : "light");

            if (toggleBtn) {
                toggleBtn.addEventListener("click", function () {
                    const nextMode = body.classList.contains("dark-mode") ? "light" : "dark";
                    localStorage.setItem(storageKey, nextMode);
                    applyTheme(nextMode);
                });
            }

            if (passwordInput && passwordToggleBtn) {
                passwordToggleBtn.addEventListener("click", function () {
                    const isPassword = passwordInput.type === "password";
                    passwordInput.type = isPassword ? "text" : "password";
                    passwordToggleBtn.textContent = isPassword ? "🙈" : "👁";
                    passwordToggleBtn.setAttribute(
                        "aria-label",
                        isPassword ? "Sakrij lozinku" : "Prikaži lozinku"
                    );
                });
            }
        });
    </script>
</body>
</html>
