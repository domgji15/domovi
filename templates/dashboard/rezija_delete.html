{% extends "base.html" %}
{% block content %}

<h3 class="mb-3 fw-bold">Obriši režiju</h3>

<div class="dashboard-card">
    <p>Jeste li sigurni da želite obrisati režiju: <strong>{{ rezija.naziv }}</strong>?</p>
    <form method="post" onsubmit="return confirm('Jeste li sigurni da želite izbrisati režiju?');">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger rounded-pill px-4">Da, obriši</button>
        <a href="{% url 'rezija_detail' rezija.id %}" class="btn btn-outline-secondary rounded-pill px-4 ms-2">Odustani</a>
    </form>
</div>

{% endblock %}
