{% extends "base.html" %}
{% block content %}

<h3 class="mb-4">Dodaj / Uredi trošak</h3>

<div class="dashboard-card">
    <form method="post">
        {% csrf_token %}
        <div class="row g-4">
            <div class="col-md-4">
                <label class="form-label">Naziv troška</label>
                {{ form.naziv }}
            </div>
            <div class="col-md-3">
                <label class="form-label">Kategorija</label>
                {{ form.kategorija }}
            </div>
            <div class="col-md-3">
                <label class="form-label">Iznos (€)</label>
                {{ form.iznos }}
            </div>
            <div class="col-md-2">
                <label class="form-label">Datum</label>
                {{ form.datum }}
            </div>

            <div class="col-md-6 food-only">
                <label class="form-label">Trgovina</label>
                {{ form.trgovina }}
            </div>
            <div class="col-md-6 food-only">
                <label class="form-label">Meso</label>
                {{ form.meso }}
            </div>
        </div>
        <button type="submit" class="btn btn-dark mt-4">Spremi</button>
        <a href="{% if profil.role == 'zaposlenik' %}{% url 'dashboard' %}{% else %}{% url 'financije' %}{% endif %}"
           class="btn btn-outline-secondary mt-4 ms-2">Odustani</a>
    </form>
</div>

<script>
const kategorijaField = document.getElementById("id_kategorija");
const foodOnlyFields = document.querySelectorAll(".food-only");

function toggleFoodFields() {
    const isKuhinja = kategorijaField && kategorijaField.value === "kuhinja";
    foodOnlyFields.forEach((field) => {
        field.style.display = isKuhinja ? "block" : "none";
    });
}

if (kategorijaField) {
    kategorijaField.addEventListener("change", toggleFoodFields);
    toggleFoodFields();
}
</script>

{% endblock %}
