<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>E-mail poslan | Domovi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f3f4f7;
            --card: #ffffff;
            --muted: #6b7280;
            --text: #111827;
            --border: #e5e7eb;
            --field: #ffffff;
            --btn: #2563eb;
            --btn-hover: #1d4ed8;
        }

        body.dark-mode {
            --bg: #0b1020;
            --card: #111827;
            --muted: #9ca3af;
            --text: #e5e7eb;
            --border: #374151;
            --field: #0f172a;
            --btn: #3b82f6;
            --btn-hover: #2563eb;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 10% 0%, rgba(37, 99, 235, 0.1), transparent 45%), var(--bg);
            color: var(--text);
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .login-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .login-card {
            width: 100%;
            max-width: 430px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.15);
            padding: 30px;
            position: relative;
        }

        .brand {
            font-size: 30px;
            font-weight: 800;
            margin-bottom: 2px;
        }

        .subtitle {
            color: var(--muted);
            margin-bottom: 20px;
        }

        .theme-toggle {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 38px;
            height: 38px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--field);
            color: var(--text);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            font-size: 16px;
            line-height: 1;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: var(--muted);
            font-size: 14px;
            text-decoration: none;
        }

        .back-link:hover {
            color: var(--text);
        }
    </style>
</head>
<body>
    <div class="login-shell">
        <div class="login-card">
            <button type="button" class="theme-toggle" id="themeToggleBtn" aria-label="Promijeni temu">
                <span id="themeIcon">🌙</span>
            </button>

            <div class="brand">Domovi</div>
            <div class="subtitle">E-mail je poslan</div>

            <p style="font-size:14px; color: var(--muted); line-height: 1.6;">
                Ako ta e-mail adresa postoji u sustavu, poslali smo ti uputu za resetiranje lozinke.
                Provjeri svoju pristiglu poštu (i mapu za neželjenu poštu).
            </p>
            <p style="font-size:14px; color: var(--muted);">
                Poveznica za resetiranje vrijedi 24 sata.
            </p>

            <a href="/login/" class="back-link">Povratak na prijavu</a>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const body = document.body;
            const toggleBtn = document.getElementById("themeToggleBtn");
            const icon = document.getElementById("themeIcon");
            const storageKey = "theme_mode";

            const applyTheme = (mode) => {
                const isDark = mode === "dark";
                body.classList.toggle("dark-mode", isDark);
                icon.textContent = isDark ? "☀️" : "🌙";
            };

            const savedMode = localStorage.getItem(storageKey);
            applyTheme(savedMode === "dark" ? "dark" : "light");

            if (toggleBtn) {
                toggleBtn.addEventListener("click", function () {
                    const nextMode = body.classList.contains("dark-mode") ? "light" : "dark";
                    localStorage.setItem(storageKey, nextMode);
                    applyTheme(nextMode);
                });
            }
        });
    </script>
</body>
</html>
